<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>工担　できるもんならやってみろ</title>
        <meta name="description" content="工事担任者攻略サイト">
        <link href="style/style.css" rel="stylesheet">
    </head>
    <body>
        <div id="wrap">
            <header>
                <div class="title_area">
                    <img src="images/headlogo.png" id="logo">
                    <div id="head_meg">
                        <h2>私が編み出した工事担任者デジタル二級の攻略方法を伝授します！<br>それは！問題を解きまくることです！</h2>
                        <h4>心が落ち着くグラデーションと難しい問題の調和で問題を解きまくりましょう。</h4>
                    </div>
                </div>
            </header>
            <main>
                <div class="content">
                    <article>
                        <div>
                            <h2>技術分野の問題を解いてみよう！</h2>
                            <p>自分が出やすいと思ったものを厳選して出しています</p>
                            <small>くれぐれも先に正解を見ないでください！！！おねがいですよ！</small>

                            <h2>問題1</h2>
                            <img src="images/koutan1.jpg" alt="問題1">
                            </div>
                            <div class="qa-block">
                            <p class="collapsible-label">[+] 解答を見る</p>
                            <p class="collapsible-content">答え: 4: 10GBASE-SW</p>
                        </div>                
                    </article>
                    <article>
                        <div>
                            <h2>問題2</h2>
                            <img src="images/mondai1.png" alt="問題2">
                        </div>
                        <div class="qa-block">
                            <p class="collapsible-label">[+] 解答を見る</p>
                            <p class="collapsible-content">答え: 3。</p>
                        </div>                
                    </article>
                    <article>
                        <div>
                            <h2>問題3</h2>
                            <img src="images/mondai1.png" alt="問題1">
                        </div>
                        <div class="qa-block">
                            <p class="collapsible-label">[+] 解答を見る</p>
                            <p class="collapsible-content">答え: 3。</p>
                        </div>                
                    </article>
                </div>
            </main>
            <footer>
                <small>&copy;2026 Koutan taisaku.</small>
            </footer>
        </div>
        <!--jQueryで回答解説の開閉 おまけ-->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function(){
                document.querySelectorAll('.collapsible-label').forEach(function(label){
                    label.addEventListener('click', function(){
                        var content = label.nextElementSibling;
                        content.classList.toggle('open');
                        label.textContent = content.classList.contains('open') ? '[-] 解答を閉じる' : '[+] 解答を見る';
                    });
                });
            });
        </script>
    </body>
</html>
